<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Receipt</title>
    <style>
	    * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', sans-serif; background-color: #f5e1c0; }

       
        header {
            background: rgba(255,255,255,0.3);
            display: flex; justify-content: space-between; align-items: center;
            padding: 20px 50px; border-bottom: 1px solid rgba(0,0,0,0.1);
        }
		.logo { font-size: 1.5rem; font-weight: bold; color: #5d4037; }
        nav a { text-decoration: none; color: #5d4037; margin-left: 20px; font-weight: 500; }
		.hero {
            background: white; margin: 20px 50px; border-radius: 20px;
            display: flex; align-items: center; padding: 40px; overflow: hidden;
        }
        .hero-text { flex: 1; }
        .hero-text h1 { font-size: 2.5rem; color: #5d4037; margin-bottom: 15px; }
        .hero-img { flex: 1; text-align: right; }
        .hero-img img { width: 100%; max-width: 400px; border-radius: 15px; }
	
        body { font-family: 'Courier New', Courier, monospace; background: #f4f4f4; padding: 50px; }
        .receipt { background: white; max-width: 400px; margin: 0 auto; padding: 20px; border: 1px solid #ddd; }
        .line { border-bottom: 1px dashed #333; margin: 10px 0; }
        .row { display: flex; justify-content: space-between; margin: 5px 0; }
        .total { font-weight: bold; font-size: 1.2rem; margin-top: 10px; }
        .btn { display: block; width: 100%; padding: 10px; background: #5d4037; color: white; text-align: center; text-decoration: none; margin-top: 20px; border-radius: 5px; }
		
		#modal-overlay {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.5); z-index: 1000; justify-content: center; align-items: center;
        }
        .modal { background: white; padding: 30px; border-radius: 15px; text-align: center; width: 300px; }
        .modal input { width: 50px; padding: 5px; margin: 10px 0; }
        .modal-btns { display: flex; gap: 10px; justify-content: center; }
    </style>
</head>
<body>
  <header>
    <div class="logo">Velvet Crust</div>
    <nav>
        <a href="dashboard.html">Home</a>
        
        <a href="index.html">Login</a>
    </nav>
</header>

<div class="receipt">
    <h2 style="text-align:center;">Velvet Crust</h2>
    <p style="text-align:center;">Official Receipt</p>
    <div class="line"></div>
    <div id="items"></div>
    <div class="line"></div>
    <div class="row total">
        <span>Grand Total:</span>
        <span id="grand-total">$0.00</span>
    </div>
    <a href="index.html" class="btn" onclick="localStorage.clear()">New Order</a>
</div>

<script>
    const cart = JSON.parse(localStorage.getItem('velvetCart')) || [];
    let total = 0;
    const itemsDiv = document.getElementById('items');

    cart.forEach(item => {
        total += item.price;
        itemsDiv.innerHTML += `
            <div class="row">
                <span>${item.name}</span>
                <span>$${item.price.toFixed(2)}</span>
            </div>
        `;
    });

    document.getElementById('grand-total').innerText = "$" + total.toFixed(2);
</script>

</body>
</html>
