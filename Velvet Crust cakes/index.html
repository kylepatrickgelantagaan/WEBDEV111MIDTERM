<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up</title>
    <style>
        
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: #fdfaf6;
            display: grid;
            grid-template-areas: 
                "header header"
                "sidebar main"
                "footer footer";
            grid-template-columns: 280px 1fr;
            grid-template-rows: 100px 1fr 60px;
            height: 100vh;
        }

        
        .header { 
            grid-area: header; 
            background: #fff; 
            border-bottom: 2px solid #1a1a1a; 
            display: flex; 
            align-items: center; 
            padding: 0 40px; 
            justify-content: space-between;
        }

        .sidebar { 
            grid-area: sidebar; 
            background: #fff; 
            border-right: 1px solid #ddd; 
            padding: 30px 20px; 
        }

        .nav-links { list-style: none; }
        .nav-links li { margin-bottom: 15px; }
        .nav-links a { text-decoration: none; color: #555; font-weight: 600; display: block; padding: 10px; }

        
        .main-content { 
            grid-area: main; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            padding: 20px;
        }

        .signup-card {
            background: white;
            padding: 40px;
            border-radius: 8px;
            border: 2px solid #1a1a1a;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.05);
        }
		
		.signup-card h2 { margin-bottom: 20px; color: #1a1a1a; }

        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; margin-bottom: 5px; font-weight: bold; font-size: 0.9rem; }
        .form-group input { 
            width: 100%; 
            padding: 12px; 
            border: 1px solid #ccc; 
            border-radius: 4px; 
        }

        .btn-signup {
            width: 100%;
            padding: 14px;
            background-color: #1a1a1a;
            color: white;
            border: none;
            border-radius: 4px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn-signup:hover { background-color: #e67e22; }


        .footer { 
            grid-area: footer; 
            background: #1a1a1a; 
            color: #fff; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            font-size: 0.8rem; 
        }
    </style>
</head>
<body>

<header class="header">
    <div style="font-size: 1.5rem; font-weight: bold; letter-spacing: 2px;" style="font-size: 0.9rem; color: #e67e22; font-weight: bold;">Valvet Crust cakes</div>
   
</header>


    <div style="margin-top: 40px; padding: 15px; background: #fdfaf6; border-radius: 5px; font-size: 0.8rem; border-left: 3px solid #e67e22;">
        Join to access Meals, Billing, and customized Plans.
    </div>
</aside>

<main class="main-content">
    <div class="signup-card">
        <h2 style="margin-bottom: 20px;">Create Account</h2>
        <form id="signupForm" onsubmit="handleSignup(event)">
            <div class="form-group">
                <label>Username</label>
                <input type="text" id="username" placeholder="Choose a username" required>
            </div>
       
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="password" placeholder="Create password" required>
            </div>
            <button type="submit" class="btn-signup">Register & Enter Dashboard</button>
        </form>
    </div>
</main>

<footer class="footer">
    &copy; 2026 Valvet Crust cakes | Official Web Portal
</footer>

<script>
    function handleSignup(event) {
       
        event.preventDefault();

        
        const username = document.getElementById('username').value;
        localStorage.setItem('currentUser', username);

       
        alert("Account created successfully! Welcome to Luna Vista, " + username + ".");

        
        window.location.href = "rep.html";
    }
</script>

</body>
</html>
