<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>log in</title>
    <style>
        * { box-sizing: border-box; }
        body { 
             color: white; font-family: sans-serif; 
            margin: 0; display: flex; flex-direction: column; height: 100vh; 
        }

        
        .top-header {
            height: 80px; background: #111; border-bottom: 1px solid #333;
            display: flex; align-items: center; padding-left: 20px; font-weight: bold;
        }

        
        .main-content {
            display: grid; grid-template-columns: 1fr 1.5fr; flex: 1;
        }

        
        .login-section {
            display: flex; flex-direction: column; justify-content: center;
            align-items: center; border-right: 1px solid #333; padding: 40px;
        }
        input { 
            width: 100%; max-width: 300px; padding: 12px; margin: 10px 0;
            background: #222; border: 1px solid #444; color: white; border-radius: 4px;
        }
        button { 
            width: 100%; max-width: 300px; padding: 12px; background: white;
            color: black; border: none; font-weight: bold; cursor: pointer; border-radius: 4px;
        }

        
        .slideshow-container { position: relative; overflow: hidden; background: #050505; }
        .slideshow-container img {
            width: 100%; height: 100%; object-fit: cover; position: absolute;
            opacity: 0; animation: crossfade 20s infinite;
        }
        
        .img1 { animation-delay: 0s; }
        .img2 { animation-delay: 4s; }
        .img3 { animation-delay: 8s; }

        @keyframes crossfade {
            0% { opacity: 0; }
            10% { opacity: 1; }
            33% { opacity: 1; }
            43% { opacity: 0; }
            100% { opacity: 0; }
        }

        
        .footer {
            height: 60px; background: #111; border-top: 1px solid #333;
            display: flex; align-items: center; justify-content: center; font-size: 0.8rem;
        }
    </style>
</head>
<body background="1000127783.png">

    <div class="top-header"><img src="download.jpg" alt="Description of the image" width="200" height="80">Vibe stream</div>

    <div class="main-content">
        <div class="login-section">
            <h2>Sign In</h2>
            <input type="text" placeholder="Username">
            <input type="password" placeholder="Password">
            <button onclick="window.location.href='dashboard.html'">SIGN IN</button>
        </div>

        <div class="slideshow-container">
            <img src="bounce-dance.gif" class="img1" alt="Slide 1">
            <img src="bxnji_boppin_1_HOUR_LOOP.gif" class="img2" alt="Slide 2">
            <img src="bxnji_boppin_1_HOUR_LOOP.gif" class="img3" alt="Slide 3">
        </div>
    </div>

    <div class="footer">LOG IN NOW OR ELSE<img src="die-death.gif" alt="Description of the image" width="200" height="99"></div>

</body>
</html>
